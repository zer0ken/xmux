[package]
name = "xmux"
version = "0.1.0"
edition = "2021"
description = "Cross-environment tmux/psmux session switcher"
license = "MIT"

[[bin]]
name = "xmux"
path = "src/main.rs"

[lib]
name = "xmux"
path = "src/lib.rs"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
